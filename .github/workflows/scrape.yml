name: Scrape PaywallScreens Data

on:
  schedule:
    # Run every Sunday at 00:00 UTC = 08:00 GMT+8
    - cron: '0 0 * * 0'
  workflow_dispatch:
    # Allow manual trigger from Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Run scraper
        run: node scripts/scrape-paywall-screens.mjs

      - name: Commit and push updated data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/data/top-apps.json
          git diff --staged --quiet && echo "No changes — skipping commit" || \
            git commit -m "chore: update PaywallScreens data $(date -u +'%Y-%m-%d')" && \
            git push
